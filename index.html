<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Chess Game</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #chessboard { display: grid; grid-template-columns: repeat(8, 1fr); width: 400px; height: 400px; }\n        .square { width: 50px; height: 50px; }\n        .white { background-color: #eee; }\n        .black { background-color: #333; color: white; }\n    </style>\n</head>\n<body>\n    <h1>Chess Game</h1>\n    <div id='chessboard'></div>\n    <script>\n        const board = document.getElementById('chessboard');\n        let selectedPiece = null;\n        const pieces = [\n            '♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖',\n            '♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟'\n        ];\n        const initializeBoard = () => {\n            for (let i = 0; i < 64; i++) {\n                const square = document.createElement('div');\n                square.classList.add('square');\n                square.classList.toggle('white', (Math.floor(i / 8) + i) % 2 === 0);\n                square.classList.toggle('black', (Math.floor(i / 8) + i) % 2 !== 0);\n                square.innerHTML = pieces[i] || '';\n                square.addEventListener('click', () => onSquareClick(square, i));\n                board.appendChild(square);\n            }\n        };\n        const onSquareClick = (square, index) => {\n            if (selectedPiece === null) {\n                selectedPiece = index;\n            } else {\n                movePiece(selectedPiece, index);\n                selectedPiece = null;\n            }\n        };\n        const movePiece = (fromIndex, toIndex) => {\n            board.children[toIndex].innerHTML = board.children[fromIndex].innerHTML;\n            board.children[fromIndex].innerHTML = '';\n        };\n        initializeBoard();\n    </script>\n</body>\n</html>\n
